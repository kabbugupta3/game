<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
 margin:0;
 background:black;
 color:white;
 text-align:center;
 font-family:sans-serif;
}
#info{
 margin-top:50px;
}
</style>
</head>

<body>

<h1>Game Start</h1>

<div id="info">
 <p>Loading info...</p>
</div>

<script>

// IP + Location fetch
fetch("https://ipapi.co/json/")
.then(res => res.json())
.then(data => {

 document.getElementById("info").innerHTML = `
   <h2>IP: ${data.ip}</h2>
   <h3>City: ${data.city}</h3>
   <h3>Country: ${data.country_name}</h3>
   <h3>Network: ${data.org}</h3>
 `;

});

// Device info
let device = navigator.userAgent;
let p = document.createElement("p");
p.innerText = "Device: " + device;
document.body.appendChild(p);

</script>

</body>
</html>
