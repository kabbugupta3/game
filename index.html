<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:sans-serif;
overflow:hidden;
}

#gameover{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

button{
padding:15px 30px;
font-size:20px;
background:cyan;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Game Start</h1>

<div id="gameover">
<h1>Game Over</h1>
<button onclick="restartGame()">Try Again</button>
</div>

<script>

// 5 sec baad game over (demo)
setTimeout(()=>{
document.getElementById("gameover").style.display="flex";
},5000);

// restart
function restartGame(){
location.reload();
}

</script>

</body>
  
</html>
